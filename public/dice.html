<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dice — tap to roll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: #e8eaf0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .scene {
      width: 140px;
      height: 140px;
      perspective: 700px;
      cursor: pointer;
    }

    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(25deg);
      transition: transform 1.1s cubic-bezier(0.2, 0.7, 0.25, 1);
    }

    .face {
      position: absolute;
      inset: 0;
      background: #f4f1ea;
      border-radius: 18px;
      border: 2px solid #d8d3c6;
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      padding: 18px;
      box-shadow: inset 0 0 22px rgba(0, 0, 0, 0.12);
    }

    .pip {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1c1e26;
      place-self: center;
      box-shadow: inset 0 3px 4px rgba(0, 0, 0, 0.55);
    }

    /* pip layouts: grid cells 1-9, left-to-right, top-to-bottom */
    .face[data-face="1"] .pip:nth-child(1) { grid-area: 2 / 2; }

    .face[data-face="2"] .pip:nth-child(1) { grid-area: 1 / 1; }
    .face[data-face="2"] .pip:nth-child(2) { grid-area: 3 / 3; }

    .face[data-face="3"] .pip:nth-child(1) { grid-area: 1 / 1; }
    .face[data-face="3"] .pip:nth-child(2) { grid-area: 2 / 2; }
    .face[data-face="3"] .pip:nth-child(3) { grid-area: 3 / 3; }

    .face[data-face="4"] .pip:nth-child(1) { grid-area: 1 / 1; }
    .face[data-face="4"] .pip:nth-child(2) { grid-area: 1 / 3; }
    .face[data-face="4"] .pip:nth-child(3) { grid-area: 3 / 1; }
    .face[data-face="4"] .pip:nth-child(4) { grid-area: 3 / 3; }

    .face[data-face="5"] .pip:nth-child(1) { grid-area: 1 / 1; }
    .face[data-face="5"] .pip:nth-child(2) { grid-area: 1 / 3; }
    .face[data-face="5"] .pip:nth-child(3) { grid-area: 2 / 2; }
    .face[data-face="5"] .pip:nth-child(4) { grid-area: 3 / 1; }
    .face[data-face="5"] .pip:nth-child(5) { grid-area: 3 / 3; }

    .face[data-face="6"] .pip:nth-child(1) { grid-area: 1 / 1; }
    .face[data-face="6"] .pip:nth-child(2) { grid-area: 2 / 1; }
    .face[data-face="6"] .pip:nth-child(3) { grid-area: 3 / 1; }
    .face[data-face="6"] .pip:nth-child(4) { grid-area: 1 / 3; }
    .face[data-face="6"] .pip:nth-child(5) { grid-area: 2 / 3; }
    .face[data-face="6"] .pip:nth-child(6) { grid-area: 3 / 3; }

    /* place the six faces on the cube (half of 140px = 70px) */
    .face[data-face="1"] { transform: rotateY(  0deg) translateZ(70px); }
    .face[data-face="2"] { transform: rotateY( 90deg) translateZ(70px); }
    .face[data-face="3"] { transform: rotateX( 90deg) translateZ(70px); }
    .face[data-face="4"] { transform: rotateX(-90deg) translateZ(70px); }
    .face[data-face="5"] { transform: rotateY(-90deg) translateZ(70px); }
    .face[data-face="6"] { transform: rotateY(180deg) translateZ(70px); }

    .result {
      font-size: 18px;
      letter-spacing: 0.02em;
      color: #9aa1b2;
      min-height: 1.5em;
      text-align: center;
    }

    .result strong { color: #e8eaf0; font-size: 26px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="scene" id="scene" role="button" aria-label="Roll the dice" tabindex="0">
      <div class="dice" id="dice">
        <div class="face" data-face="1"><span class="pip"></span></div>
        <div class="face" data-face="2"><span class="pip"></span><span class="pip"></span></div>
        <div class="face" data-face="3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="face" data-face="4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="face" data-face="5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="face" data-face="6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
      </div>
    </div>
    <p class="result" id="result" aria-live="polite">Tap the dice to roll</p>
  </div>

  <script>
    const dice = document.getElementById('dice');
    const scene = document.getElementById('scene');
    const result = document.getElementById('result');

    // rotation that brings each face to the front
    const faceRotations = {
      1: { x: 0,   y: 0   },
      2: { x: 0,   y: -90 },
      3: { x: -90, y: 0   },
      4: { x: 90,  y: 0   },
      5: { x: 0,   y: 90  },
      6: { x: 0,   y: 180 },
    };

    // accumulate spins so every roll animates a fresh set of full turns
    let spinX = -20;
    let spinY = 25;
    let rolling = false;

    function roll() {
      if (rolling) return;
      rolling = true;
      result.textContent = 'Rolling…';

      const value = Math.floor(Math.random() * 6) + 1;
      const target = faceRotations[value];

      // 2-4 extra full turns on each axis, always moving forward
      const extraX = (Math.floor(Math.random() * 3) + 2) * 360;
      const extraY = (Math.floor(Math.random() * 3) + 2) * 360;

      spinX = spinX - (spinX % 360) + extraX + target.x;
      spinY = spinY - (spinY % 360) + extraY + target.y;

      dice.style.transform = `rotateX(${spinX}deg) rotateY(${spinY}deg)`;

      dice.addEventListener('transitionend', () => {
        rolling = false;
        result.innerHTML = `You rolled a <strong>${value}</strong>`;
      }, { once: true });
    }

    scene.addEventListener('click', roll);
    scene.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); roll(); }
    });
  </script>
</body>
</html>
